<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my baby 🎀</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* soft kawaii background */
        background: linear-gradient(135deg, #ffd1dc, #fff0f5);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        padding: 20px;
    }

    /* floating hearts background */
    body::before {
        content: "💖 🎀 💖 🎀 💖 🎀 💖";
        position: absolute;
        top: 10%;
        font-size: 30px;
        opacity: 0.2;
        width: 100%;
        text-align: center;
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }

    .card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 30px;
        padding: 50px 25px;
        box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .kitty {
        font-size: 60px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 8vw;
        color: #ff4fa3;
        margin: 10px 0;
    }

    p {
        font-size: 5vw;
        color: #666;
        margin-bottom: 25px;
    }

    button {
        width: 85%;
        max-width: 280px;
        padding: 18px;
        font-size: 6vw;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        margin: 10px 0;
        transition: 0.2s ease;
        font-weight: bold;
    }

    button:active {
        transform: scale(0.95);
    }

    .yes {
        background: #ff4fa3;
        color: white;
    }

    .yes2 {
        background: #ff8fc7;
        color: white;
    }

    #response {
        margin-top: 25px;
        font-size: 5.5vw;
        color: #333;
        opacity: 0;
        transition: 0.5s ease;
    }

    #response.show {
        opacity: 1;
    }
</style>
</head>

<body>

    <div class="card">
        <div class="kitty">🎀🐱</div>

        <h1>Pwede ba kitang ligawan?</h1>
        <p>pili ka baby 💕</p>

        <button class="yes" onclick="showResponse()">Yes 💖</button>
        <button class="yes2" onclick="showResponse()">Yes parin 💘</button>

        <div id="response"></div>
    </div>

<script>
function showResponse(){
    const res = document.getElementById("response");
    res.innerHTML = "YAYAYAY 🎀 starting today, nililigawan na kita 💖🐱";
    res.classList.add("show");
}
</script>

</body>
</html>
