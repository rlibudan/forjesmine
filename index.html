<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my baby 🎀</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd1dc, #fff0f5);
    font-family: 'Quicksand', sans-serif;
    text-align: center;
    padding: 20px;
}

/* CARD */
.card {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 30px;
    padding: 45px 25px;
    box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
}

/* KAWAII HEADER */
.kitty {
    font-size: 55px;
}

h1 {
    font-size: 7vw;
    color: #ff4fa3;
    font-weight: 700;
    margin: 10px 0;
}

p {
    font-size: 4.8vw;
    color: #666;
    margin-bottom: 25px;
}

/* BUTTONS */
button {
    width: 85%;
    max-width: 280px;
    padding: 16px;
    font-size: 5.5vw;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    margin: 10px 0;
    font-weight: 600;
}

.yes {
    background: #ff4fa3;
    color: white;
}

.yes2 {
    background: #ff8fc7;
    color: white;
}

/* POPUP BACKDROP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

/* POPUP BOX */
.popup-content {
    background: white;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 80%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.popup-content h2 {
    color: #ff4fa3;
    font-size: 6vw;
}

.close {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #ff4fa3;
    color: white;
    font-size: 5vw;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="kitty">🎀🐱</div>

    <h1>Pwede ba kitang ligawan?</h1>
    <p>pili ka baby 💕</p>

    <button class="yes" onclick="showPopup()">Yes 💖</button>
    <button class="yes2" onclick="showPopup()">Yes parin 💘</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>YAYAYAY 🎀</h2>
        <p>starting today, nililigawan na kita 💖🐱</p>
        <button class="close" onclick="closePopup()">ok hmp 💕</button>
    </div>
</div>

<script>
function showPopup(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
