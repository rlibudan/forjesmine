<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        padding: 20px;
    }

    .card {
        width: 100%;
        height: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background: rgba(255,255,255,0.95);
        border-radius: 30px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        padding: 40px 25px;
    }

    h1 {
        font-size: 9vw; /* responsive big text */
        color: #ff4d6d;
        margin-bottom: 10px;
    }

    p {
        font-size: 5vw;
        color: #555;
        margin-bottom: 20px;
    }

    button {
        margin-top: 20px;
        padding: 18px 40px;
        font-size: 6vw;
        border: none;
        border-radius: 15px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        width: 80%;
        max-width: 300px;
    }

    #response {
        margin-top: 25px;
        font-size: 5.5vw;
        color: #333;
        opacity: 0;
        transition: 0.5s ease;
    }

    #response.show {
        opacity: 1;
    }
</style>
