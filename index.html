<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd1dc, #fff0f5);
    font-family: 'Quicksand', sans-serif;
    text-align: center;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 30px;
    padding: 45px 25px;
    box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
}

.kitty {
    font-size: 55px;
}

/* 💖 BIG QUESTION */
h1 {
    font-size: 11vw;   /* 👈 ENLARGED */
    color: #ff4fa3;
    font-weight: 800;
    margin: 10px 0;
    line-height: 1.1;
}

p {
    font-size: 5vw;
    color: #666;
    margin-bottom: 25px;
}

button {
    width: 85%;
    max-width: 280px;
    padding: 16px;
    font-size: 5.5vw;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    margin: 10px 0;
    font-weight: 600;
}

.yes {
    background: #ff4fa3;
    color: white;
}

.yes2 {
    background: #ff8fc7;
    color: white;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 80%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* 💖 BIG YAYAYAY */
.popup-content h2 {
    color: #ff4fa3;
    font-size: 14vw;  /* 👈 ENLARGED */
    margin: 0;
    font-weight: 800;
}

.popup-content p {
    font-size: 5vw;
    color: #444;
}

.close {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #ff4fa3;
    color: white;
    font-size: 5vw;
    cursor: pointer;
}
</style>
