<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my baby ❤️</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        overflow: hidden;
    }

    /* soft floating glow */
    body::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: rgba(255,255,255,0.3);
        filter: blur(80px);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-40px); }
    }

    .card {
        width: 90%;
        max-width: 420px;
        background: rgba(255,255,255,0.95);
        padding: 50px 25px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        z-index: 1;
        backdrop-filter: blur(8px);
    }

    h1 {
        font-size: 34px;
        color: #ff4d6d;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        color: #555;
    }

    button {
        margin-top: 25px;
        padding: 16px 35px;
        font-size: 20px;
        border: none;
        border-radius: 15px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
        width: 100%;
        max-width: 250px;
    }

    button:active {
        transform: scale(0.95);
    }

    #response {
        margin-top: 25px;
        font-size: 20px;
        color: #333;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.5s ease;
    }

    #response.show {
        opacity: 1;
        transform: translateY(0);
    }
</style>
</head>

<body>
    <div class="card">
        <h1>Pwede ba kitang ligawan? 💌</h1>
        <p>tap mo lang yung button baby</p>

        <button onclick="showResponse()">Yes 💖</button>

        <div id="response">
            YAYAYAY! starting today, nililigawan na kita ❤️
        </div>
    </div>

<script>
function showResponse(){
    const res = document.getElementById("response");
    res.classList.add("show");
}
</script>

</body>
</html>
